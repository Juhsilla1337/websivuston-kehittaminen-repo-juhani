<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Quicksand:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Contact - Purringbrothers</title>
  </head>
  <body>
    <div id="header"></div>

    <main>
      <section class="blog-header">
        <img
          src="./images/contactbannerhavu.webp"
          alt="Blog header image"
          class="blogbanner"
        />
        <h2 class="blog-h2">Contact Us</h2>
      </section>
    <div class="content">

  <p>If you want to reach us about Ruska, Havu or Noki, send a message below</p>
  <p>If you’d like to inquire about using the images or are interested in collaboration, feel free to contact us using this form.</p>

  <form class="contact-form">
    <input type="text" name="name" placeholder="Your name" required />

    <input type="email" name="email" placeholder="Your email" required />

    <textarea name="message" placeholder="Your message..." rows="5" required></textarea>

    <button type="submit">Send</button>
  </form>
</div>
    </main>

    <div id="footer"></div>
    <script src="./scripts/include.js"></script>
    <script src="./scripts/main.js"></script>
  </body>
</html>
